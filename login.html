<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Sree Bhagavathi</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div style="display:flex; justify-content:center; align-items:center; height:100vh;">

  <div style="background:white; padding:40px; border-radius:10px; box-shadow:0 10px 30px rgba(0,0,0,0.1);">

    <h2 style="margin-bottom:20px;">Customer Login</h2>

    <input id="name" placeholder="Your Name" style="display:block; margin-bottom:15px; padding:10px; width:250px;">
    <input id="mobile" placeholder="Mobile Number" style="display:block; margin-bottom:15px; padding:10px; width:250px;">

    <button type="button" onclick="login()" style="padding:10px 20px; background:#c6a87d; color:white; border:none; cursor:pointer;">
      Login
    </button>

  </div>

</div>

<!-- 🔥 IMPORTANT -->
<script src="auth.js"></script>

</body>
</html>
